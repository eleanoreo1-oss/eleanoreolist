<!doctype html>
<html><head><meta charset="utf-8"><title>EDL · Primary Color Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:18px 20px}
  .label{font:800 12px/1 var(--font-body);color:var(--edl-color-primary-50);letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
  .name{font:500 16px/1.2 var(--font-body);color:#171C20;margin-bottom:10px}
  .row{display:grid;grid-template-columns:repeat(13,1fr);gap:6px}
  .sw{aspect-ratio:1.6;border-radius:6px;display:flex;align-items:flex-end;padding:5px 6px;font:800 9px/1 var(--font-body);color:#fff;border:1px solid rgba(0,0,0,.04)}
  .sw.lt{color:#171C20}
</style></head>
<body>
<div class="wrap">
  <div class="label">Primary · Indigo · Base #3611C8</div>
  <div class="row">
    <div class="sw lt" style="background:#F3F3FF">99</div>
    <div class="sw lt" style="background:#E6E6FF">95</div>
    <div class="sw lt" style="background:#CFCFFF">90</div>
    <div class="sw lt" style="background:#B8B8FF">85</div>
    <div class="sw lt" style="background:#9C92FF">75</div>
    <div class="sw" style="background:#7E70FF">65</div>
    <div class="sw" style="background:#5B43F2">55</div>
    <div class="sw" style="background:#3611C8">50</div>
    <div class="sw" style="background:#290CA1">40</div>
    <div class="sw" style="background:#1F0985">30</div>
    <div class="sw" style="background:#150670">20</div>
    <div class="sw" style="background:#0A034A">10</div>
    <div class="sw" style="background:#050125">05</div>
  </div>
</div>
</body></html>
