<!doctype html>
<html><head><meta charset="utf-8"><title>EDL · Secondary &amp; Tertiary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
  .label{font:800 11px/1 var(--font-body);letter-spacing:.04em;text-transform:uppercase}
  .row{display:grid;grid-template-columns:repeat(13,1fr);gap:5px}
  .sw{aspect-ratio:1.6;border-radius:5px;display:flex;align-items:flex-end;padding:4px 5px;font:800 8px/1 var(--font-body);color:#fff;border:1px solid rgba(0,0,0,.04)}
  .sw.lt{color:#171C20}
</style></head>
<body>
<div class="wrap">
  <div>
    <div class="label" style="color:#0072ED;margin-bottom:7px">Secondary · Blue · #0072ED</div>
    <div class="row">
      <div class="sw lt" style="background:#F6FAFF">99</div><div class="sw lt" style="background:#EDF5FF">95</div><div class="sw lt" style="background:#D6E8FF">90</div><div class="sw lt" style="background:#BEDAFF">85</div><div class="sw lt" style="background:#8EC0FF">75</div><div class="sw lt" style="background:#5FA5FF">65</div><div class="sw" style="background:#2F8CFF">55</div><div class="sw" style="background:#0072ED">50</div><div class="sw" style="background:#004ACF">40</div><div class="sw" style="background:#00269F">30</div><div class="sw" style="background:#001988">20</div><div class="sw" style="background:#000658">10</div><div class="sw" style="background:#000333">05</div>
    </div>
  </div>
  <div>
    <div class="label" style="color:#7418C1;margin-bottom:7px">Tertiary · Purple · #7418C1</div>
    <div class="row">
      <div class="sw lt" style="background:#F9F3FE">99</div><div class="sw lt" style="background:#F2E6FD">95</div><div class="sw lt" style="background:#E6CFFA">90</div><div class="sw lt" style="background:#D9B8F7">85</div><div class="sw lt" style="background:#C08AEE">75</div><div class="sw" style="background:#A760E2">65</div><div class="sw" style="background:#8E3BD3">55</div><div class="sw" style="background:#7418C1">50</div><div class="sw" style="background:#610BA8">40</div><div class="sw" style="background:#4D028B">30</div><div class="sw" style="background:#43017B">20</div><div class="sw" style="background:#2E0059">10</div><div class="sw" style="background:#190030">05</div>
    </div>
  </div>
</div>
</body></html>
