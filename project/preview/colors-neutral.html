<!doctype html>
<html><head><meta charset="utf-8"><title>EDL · Neutral Color Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:18px 20px}
  .label{font:800 12px/1 var(--font-body);color:var(--edl-color-neutral-30);letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
  .row{display:grid;grid-template-columns:repeat(13,1fr);gap:6px}
  .sw{aspect-ratio:1.6;border-radius:6px;display:flex;align-items:flex-end;padding:5px 6px;font:800 9px/1 var(--font-body);color:#fff;border:1px solid rgba(0,0,0,.04)}
  .sw.lt{color:#171C20}
</style></head>
<body>
<div class="wrap">
  <div class="label">Neutral · Cool gray · Base #171C20</div>
  <div class="row">
    <div class="sw lt" style="background:#F7F9FA">99</div>
    <div class="sw lt" style="background:#EFF3F5">95</div>
    <div class="sw lt" style="background:#E2E9EC">90</div>
    <div class="sw lt" style="background:#D4DEE3">85</div>
    <div class="sw lt" style="background:#B8C7D0">75</div>
    <div class="sw lt" style="background:#9EB0BD">65</div>
    <div class="sw" style="background:#8498A9">55</div>
    <div class="sw" style="background:#6A8095">50</div>
    <div class="sw" style="background:#526374">40</div>
    <div class="sw" style="background:#3A4652">30</div>
    <div class="sw" style="background:#2E3841">20</div>
    <div class="sw" style="background:#171C20">10</div>
    <div class="sw" style="background:#0C0F12">05</div>
  </div>
</div>
</body></html>
