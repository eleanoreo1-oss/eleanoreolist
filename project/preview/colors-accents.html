<!doctype html>
<html><head><meta charset="utf-8"><title>EDL · Decorative accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;gap:14px;align-items:center}
  .name{flex:0 0 80px;font:800 11px/1 var(--font-body);letter-spacing:.04em;text-transform:uppercase;color:#171C20}
  .ramp{flex:1;display:flex;height:46px;border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
  .step{flex:1;display:flex;align-items:flex-end;padding:4px;color:#fff;font:800 9px/1 var(--font-body)}
  .step.lt{color:#171C20}
  .hex{font-family:var(--font-mono);color:#526374;font-size:11px;width:80px;text-align:right}
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <span class="name" style="color:#18779C">Aqua</span>
    <div class="ramp">
      <div class="step lt" style="background:#E6FDFF"></div><div class="step lt" style="background:#B9F8FF"></div><div class="step lt" style="background:#69E9FF"></div><div class="step" style="background:#25D1F4"></div><div class="step" style="background:#18779C"></div><div class="step" style="background:#0E3D5A"></div>
    </div>
    <span class="hex">#25D1F4</span>
  </div>
  <div class="row">
    <span class="name" style="color:#B59105">Yellow</span>
    <div class="ramp">
      <div class="step lt" style="background:#FFFEE6"></div><div class="step lt" style="background:#FFF9B8"></div><div class="step lt" style="background:#FFE25C"></div><div class="step lt" style="background:#FDBE00"></div><div class="step" style="background:#B59105"></div><div class="step" style="background:#826C06"></div>
    </div>
    <span class="hex">#FDBE00</span>
  </div>
  <div class="row">
    <span class="name" style="color:#8B0685">Pink</span>
    <div class="ramp">
      <div class="step lt" style="background:#FCECFF"></div><div class="step lt" style="background:#F9D9FF"></div><div class="step" style="background:#F457FD"></div><div class="step" style="background:#EA04DF"></div><div class="step" style="background:#8B0685"></div><div class="step" style="background:#480444"></div>
    </div>
    <span class="hex">#EA04DF</span>
  </div>
</div>
</body></html>
